name: CI

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Python and Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check backend syntax
        run: |
          python -m py_compile backend/main.py
          python -m compileall -q backend

      - name: Validate Flask application import
        working-directory: backend
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          HUGGINGFACEHUB_API_TOKEN: ${{ secrets.HUGGINGFACEHUB_API_TOKEN }}
        run: python -c "from main import app; assert app.config['JWT_SECRET_KEY']"

      - name: Validate Docker image build
        run: docker build --tag eco-opti-agent:${{ github.sha }} .

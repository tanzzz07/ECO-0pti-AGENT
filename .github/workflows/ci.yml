name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test application and image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: "sqlite:///:memory:"
      JWT_SECRET_KEY: ci-only-jwt-secret-with-at-least-32-bytes
      HUGGINGFACEHUB_API_TOKEN: ci-placeholder-token

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check backend syntax
        run: |
          python -m py_compile backend/main.py
          python -m compileall -q backend

      - name: Run application smoke tests
        run: python -m unittest discover -s tests -v

      - name: Build Docker image
        run: docker build --tag eco-opti-agent:ci .

      - name: Smoke test Docker container
        shell: bash
        run: |
          docker run --detach --rm \
            --name eco-opti-agent-ci \
            --publish 7860:7860 \
            --env JWT_SECRET_KEY="$JWT_SECRET_KEY" \
            --env HUGGINGFACEHUB_API_TOKEN="$HUGGINGFACEHUB_API_TOKEN" \
            eco-opti-agent:ci

          cleanup() {
            docker stop eco-opti-agent-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:7860/ping |
              grep --quiet '"status":"ok"'; then
              exit 0
            fi
            sleep 2
          done

          docker logs eco-opti-agent-ci
          exit 1

name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: hugging-face-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hugging Face Space
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    env:
      SPACE_ID: tanzz07/Eco-0pti_AGent
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      HUGGINGFACEHUB_API_TOKEN: ${{ secrets.HUGGINGFACEHUB_API_TOKEN }}

    steps:
      - name: Check out validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face Hub client
        run: python -m pip install --upgrade "huggingface-hub==1.19.0"

      - name: Validate deployment secrets
        shell: bash
        run: |
          test -n "$HF_TOKEN"
          test -n "$JWT_SECRET_KEY"
          test -n "$HUGGINGFACEHUB_API_TOKEN"

      - name: Configure Space secrets and deploy
        shell: python
        run: |
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["SPACE_ID"]

          api.add_space_secret(
              repo_id=space_id,
              key="JWT_SECRET_KEY",
              value=os.environ["JWT_SECRET_KEY"],
          )
          api.add_space_secret(
              repo_id=space_id,
              key="HUGGINGFACEHUB_API_TOKEN",
              value=os.environ["HUGGINGFACEHUB_API_TOKEN"],
          )

          api.upload_folder(
              repo_id=space_id,
              repo_type="space",
              folder_path=".",
              path_in_repo=".",
              ignore_patterns=[
                  ".git/**",
                  ".github/**",
                  ".agents/**",
                  ".venv/**",
                  ".vscode/**",
                  "**/__pycache__/**",
                  "**/*.pyc",
                  "**/.env",
                  "**/instance/**",
                  "**/reports/generated_pdfs/**",
                  "*.pdf",
              ],
              delete_patterns=["*"],
              commit_message=(
                  "Deploy GitHub commit "
                  + os.environ["GITHUB_SHA"]
              ),
          )
        env:
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}

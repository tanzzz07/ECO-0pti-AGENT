<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Eco Opti Agent</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="FullLogo_NoBuffer.jpg" type="image/jpeg" />

    <script>
      const token = localStorage.getItem("token");
      const role = localStorage.getItem("role");

      if (!token) {
        window.location.replace("login.html");
      } else if (role !== "admin") {
        alert("Admin access only");
        window.location.replace("dashboard.html");
      }
    </script>

    <style>
      body {
        align-items: flex-start;
        padding: 32px 16px;
      }

      .admin-container {
        max-width: 1100px;
        border-radius: 24px;
      }

      .admin-header {
        padding: 32px;
      }

      .admin-header h1 {
        width: 100%;
        margin: 0;
        font-size: clamp(2rem, 5vw, 2.8rem);
      }

      .admin-header p {
        margin-top: 8px;
      }

      .admin-content {
        padding: 24px;
      }

      .toolbar {
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 24px;
      }

      .stat-card {
        flex: 1;
        min-width: 180px;
        padding: 20px 24px;
        background: linear-gradient(135deg, #ffffff, #edf6ff);
        border: 1px solid rgba(52, 152, 219, 0.18);
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(44, 62, 80, 0.08);
      }

      .stat-label {
        color: #6b7c8d;
        font-size: 0.95rem;
        font-weight: 600;
      }

      .stat-value {
        display: block;
        margin-top: 4px;
        color: #2c3e50;
        font-size: 2.2rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .admin-button {
        min-height: 46px;
        padding: 11px 18px;
        border: 0;
        border-radius: 12px;
        color: #ffffff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .admin-button:hover {
        transform: translateY(-2px);
      }

      .back-button {
        background: linear-gradient(135deg, #3498db, #2980b9);
        box-shadow: 0 6px 18px rgba(52, 152, 219, 0.25);
      }

      .logout-button {
        background: linear-gradient(135deg, #e74c3c, #c0392b);
        box-shadow: 0 6px 18px rgba(231, 76, 60, 0.22);
      }

      .users-card {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      .table-heading {
        margin: 0;
        padding: 20px 24px;
      }

      .table-wrapper {
        width: 100%;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      th,
      td {
        padding: 15px 20px;
        border-bottom: 1px solid #e8edf2;
      }

      th {
        background: #f4f8fb;
        color: #34495e;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      td {
        color: #455667;
      }

      tbody tr {
        transition: background-color 0.2s ease;
      }

      tbody tr:hover {
        background: #f7fbff;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .role-badge {
        display: inline-block;
        padding: 5px 11px;
        border-radius: 999px;
        background: #e3f2fd;
        color: #1976d2;
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: capitalize;
      }

      .role-badge.admin {
        background: #e8f5e9;
        color: #2e7d32;
      }

      .status-message {
        padding: 28px 24px;
        color: #6b7c8d;
        text-align: center;
      }

      .admin-error {
        display: none;
        margin-bottom: 20px;
        padding: 14px 18px;
        border: 1px solid #ef9a9a;
        border-radius: 12px;
        background: #ffebee;
        color: #b71c1c;
        font-weight: 600;
      }

      @media (max-width: 700px) {
        body {
          padding: 0;
        }

        .admin-container {
          min-height: 100vh;
          border-radius: 0;
        }

        .admin-content {
          padding: 18px 14px;
        }

        .toolbar {
          flex-direction: column;
        }

        .nav-actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        th,
        td {
          padding: 13px 14px;
          white-space: nowrap;
        }
      }

      @media (max-width: 420px) {
        .nav-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <main class="container admin-container">
      <header class="admin-header">
        <h1>🛡️ Admin Dashboard</h1>
        <p>Manage and review Eco Opti Agent users</p>
      </header>

      <section class="admin-content">
        <div class="toolbar">
          <div class="stat-card" aria-live="polite">
            <span class="stat-label">Total Users</span>
            <strong id="total-users" class="stat-value">0</strong>
          </div>

          <nav class="nav-actions" aria-label="Admin navigation">
            <button id="dashboard-button" class="admin-button back-button" type="button">
              Back to Dashboard
            </button>
            <button id="logout-button" class="admin-button logout-button" type="button">
              Logout
            </button>
          </nav>
        </div>

        <div id="error-message" class="admin-error" role="alert"></div>

        <section class="card users-card" aria-labelledby="users-heading">
          <h2 id="users-heading" class="table-heading">Registered Users</h2>

          <div id="table-wrapper" class="table-wrapper" hidden>
            <table>
              <thead>
                <tr>
                  <th scope="col">ID</th>
                  <th scope="col">Username</th>
                  <th scope="col">Email</th>
                  <th scope="col">Role</th>
                </tr>
              </thead>
              <tbody id="users-table-body"></tbody>
            </table>
          </div>

          <p id="status-message" class="status-message">Loading users...</p>
        </section>
      </section>
    </main>

    <script>
      const API_URL = "/get_all_users";

      const totalUsers = document.getElementById("total-users");
      const tableWrapper = document.getElementById("table-wrapper");
      const tableBody = document.getElementById("users-table-body");
      const statusMessage = document.getElementById("status-message");
      const errorMessage = document.getElementById("error-message");

      document
        .getElementById("dashboard-button")
        .addEventListener("click", () => {
          window.location.href = "dashboard.html";
        });

      document
        .getElementById("logout-button")
        .addEventListener("click", () => {
          localStorage.removeItem("token");
          localStorage.removeItem("role");
          window.location.href = "login.html";
        });

      function addCell(row, value) {
        const cell = document.createElement("td");
        cell.textContent = value ?? "";
        row.appendChild(cell);
        return cell;
      }

      function renderUsers(users) {
        tableBody.replaceChildren();
        totalUsers.textContent = users.length;

        if (users.length === 0) {
          tableWrapper.hidden = true;
          statusMessage.hidden = false;
          statusMessage.textContent = "No users found.";
          return;
        }

        users.forEach((user) => {
          const row = document.createElement("tr");

          addCell(row, user.id);
          addCell(row, user.username);
          addCell(row, user.email);

          const roleCell = document.createElement("td");
          const roleBadge = document.createElement("span");
          const userRole = String(user.role ?? "user");

          roleBadge.className =
            "role-badge" + (userRole.toLowerCase() === "admin" ? " admin" : "");
          roleBadge.textContent = userRole;
          roleCell.appendChild(roleBadge);
          row.appendChild(roleCell);

          tableBody.appendChild(row);
        });

        statusMessage.hidden = true;
        tableWrapper.hidden = false;
      }

      function showError(message) {
        statusMessage.hidden = true;
        tableWrapper.hidden = true;
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
      }

      async function loadUsers() {
        try {
          const response = await fetch(API_URL, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: "application/json",
            },
          });

          let data = null;

          try {
            data = await response.json();
          } catch {
            // The status code still provides a useful fallback error below.
          }

          if (!response.ok) {
            const apiMessage =
              data?.error || data?.message || `Request failed (${response.status})`;
            throw new Error(apiMessage);
          }

          if (!Array.isArray(data)) {
            throw new Error("The server returned an invalid users response.");
          }

          renderUsers(data);
        } catch (error) {
          console.error("Unable to load users:", error);
          showError(
            `Unable to load users. ${error.message || "Please try again later."}`
          );
        }
      }

      loadUsers();
    </script>
  </body>
</html>
